# Analysis annotations for the perlmutter_1.3.1d OSIRIS run.
#
# This file holds ONLY values obtained by inspecting the data (shock fit, manually
# read downstream edges, notable times). Run parameters (reference_density, charge
# states, rqm_factor, geometry, deck name) live in the run's single source of truth
# and are read via analysis_utils.RunSpec — never duplicated here. RunSpec resolves
# <sim_dir>/run.yaml, then run_manifest.yaml, then runme*.sh.
#
# Lengths in c/ωpe, velocities in c, unless noted.

sim_dir: /pscratch/sd/d/dschnei/perlmutter_1.3.1d  # override with $MAGSHOCKZ_SIM_DIR

# Dump indices to load (file suffix: p1x1-al-{t:06d}.h5). NOT simulation time —
# extract run_attrs["TIME"] from HDF5 for physical time. List or start/stop/step.
times:
  start: 0
  stop: 360   # inclusive -> 0, 20, 40, ..., 360
  step: 20

# Shock-front fit, read off the overview streak plot.
#   v_shock   : single "Mach number" seed [c]; sets M_A in compute_dimensionless_params
#               and seeds the front-detection window. The energy-partition / heating
#               analyses instead use the instantaneous derivative of the auto-fitted
#               front trajectory (so v_shock there tracks the front deceleration).
#   fit_degree: optional polynomial degree for that trajectory fit (default 2).
shock:
  v_shock: 0.0375       # shock velocity in c
  x_shock_0: 750.0      # shock position at t_sim=0 [c/ωpe]
  # fit_degree: 2

# Per-dump manually inspected values, keyed by t_val (dump file suffix).
#   x_downstream_start : left edge of the downstream region [c/ωpe]  (required)
#   x_shock            : overrides x_shock_0 + v_shock * t_sim         (optional)
dump_params:
  360:
    x_downstream_start: 1100.0

# Notable dump indices worth plotting/inspecting (optional, free-form).
# interesting_times: [120, 240, 360]

# FLASH detection seeds (physical units).
#   v_shock_est_cms : first-guess shock velocity [cm/s] seeding the detection window.
#   x_shock_0_cm    : shock position along the LOS at the IC dump time [cm].
flash:
  v_shock_est_cms: 9.16e7   # cm/s
  x_shock_0_cm:   0.19      # position at IC dump [cm]; update after first run

# Optional analysis-setting overrides (code defaults shown):
# field_mode: full              # "full": total B²; "delta": subtract upstream mean B
# upstream_window_ncells: 200   # averaging window for compute_dimensionless_params.py
# downstream_window_ncells: 200
