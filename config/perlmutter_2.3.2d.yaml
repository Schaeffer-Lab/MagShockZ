# Analysis annotations for the perlmutter_2.3.2d OSIRIS run (2D test data).
#
# Holds ONLY values read from the data. Run parameters (reference_density, charge
# states, rqm_factor, deck name) come from <sim_dir>/run.yaml via analysis_utils.RunSpec.
# Lengths in c/ωpe, velocities in c, unless noted.
#
# 2D layout (auto-detected by analysis_utils.detect_layout, recorded for reference):
# shock-normal axis = x2 (x2 in [350, 3000]); transverse axis = x1 (x1 in [-1500, 1500]);
# species charge density is NOT time-averaged (MS/DENSITY/<sp>/charge/, no -savg).

sim_dir: /pscratch/sd/d/dschnei/perlmutter_2.3.2d  # override with $MAGSHOCKZ_SIM_DIR

# Dump indices to load (file suffix: p1x2-al-{t:06d}.h5). NOT simulation time.
# 257 dumps available (0..256), saved every index.
times:
  start: 0
  stop: 256   # inclusive
  step: 16

# PLACEHOLDER shock fit — update after inspecting the overview streaks.
# Shock propagates along x2 (in [350, 3000]); x_shock_0 is the front at t_sim=0.
shock:
  v_shock: 0.05         # shock velocity in c (GUESS — fit from streak plot)
  x_shock_0: 400.0      # shock position at t_sim=0 [c/ωpe] (GUESS)

# Per-dump manually inspected values, keyed by t_val (dump file suffix).
dump_params:
  256:
    x_downstream_start: 1000.0   # GUESS — left edge of downstream region [c/ωpe]

# Notable dump indices worth plotting/inspecting (optional, free-form).
# interesting_times: [64, 128, 256]

# Optional analysis-setting overrides (code defaults shown):
# field_mode: full
# upstream_window_ncells: 200
# downstream_window_ncells: 200
