# Convergence run: identical to perlmutter_1d.run.yaml but with rqm_factor = 1
# (real ion mass ratio, no reduction). At rqm_factor = 1 the magnetization sigma
# converges to the physical value; M_A, beta_e and T_e/T_i remain conserved.
# NOTE: real ion mass makes the ion gyrotime ~100x longer (tmax) and the ion scales
# ~10x larger, so this is a validation/convergence setup, not a cheap production run.
#   python FLASH_OSIRIS_define.py --config ../runs/perlmutter_1d_rqm1.run.yaml

data_path: /pscratch/sd/d/dschnei/FLASH_3D_noshield/MagShockZ_hdf5_plt_cnt_0009
dim: 1
inputfile_name: magshockz_rqm1_dx0.3_ppc500_g20
reference_density: 5.0e18
rqm_factor: 1
dx: 0.1
ppc: 500
tmax_gyroperiods: 20
algorithm: cuda
node_number: [2]
num_threads: 1
n_dump_total: 512
restart: false

# Populations separated by FLASH material; rename to the historical al/si
# (cham=Al chamber, targ=Si target). See perlmutter_1d.run.yaml for details.
species_names: {cham: al, targ: si}
charge_states: {al: 13, si: 14}   # analysis-only metadata (Z per species)

geometry:
  start_point: [0, 0.07, 0]
  end_point: [0, 0.70, 0]

solver:
  vpml_bnd_size: 100
  emf_boundary: [pmc, vpml]
  part_boundary: [thermal, thermal]
  interpolation: cubic
  smooth_type: binomial
  smooth_order: 2

diagnostics:
  n_ave: 6
  emf_reports: [b1, b2, b3, e1, e2, e3]
  reports: [charge, j1, j2, j3, q1, q2, q3]
  rep_udist: [uth1, uth2, ufl1, ufl2]
  phasespaces: [p1x1, p2x1, p3x1, gx1]
  e_ps_pmin: [-1, -1, -0.5]
  e_ps_pmax: [1, 1, 0.5]
  i_ps_pmin: [-0.15, -0.15, -0.05]
  i_ps_pmax: [0.15, 0.15, 0.05]
  ps_np: [4096, 4096, 4096]
  ps_ngamma: 128
  ps_gammamax: 3.0
  ps_nx: 1024
  ps_ny: 512
